{% extends "base.html" %}
{% block content %}
  <div class="mx-auto max-w-lg">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-900">
      <div class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Local recovery</div>
      <h1 class="mt-2 text-2xl font-semibold text-slate-900 dark:text-slate-100">Reset admin password</h1>
      <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">
        This screen only works from this computer when local admin reset mode is enabled.
      </p>

      {% if error %}
        <div class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-900 dark:border-red-800 dark:bg-red-950/40 dark:text-red-200">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="/reset-admin-password" class="mt-6 space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-400" for="username">Admin account</label>
          <select
            id="username"
            name="username"
            required
            autocomplete="username"
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100"
          >
            <option value="">Choose account</option>
            {% for user in admin_users %}
              <option value="{{ user.username }}" {% if submitted_username == user.username %}selected{% endif %}>
                {{ user.full_name or user.username }} ({{ user.username }})
              </option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-400" for="password">New password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
            autofocus
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100"
          />
          <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Minimum 12 characters.</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-400" for="confirm_password">Confirm password</label>
          <input
            id="confirm_password"
            name="confirm_password"
            type="password"
            autocomplete="new-password"
            required
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100"
          />
        </div>
        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white"
        >
          Reset password and sign in
        </button>
      </form>
    </div>
  </div>
{% endblock %}
