{% extends "base.html" %}
{% block content %}
  <div class="flex min-h-[min(28rem,50vh)] flex-col items-center justify-center px-4 py-10">
    <div class="w-full max-w-md rounded-2xl border border-amber-200/90 bg-amber-50 px-5 py-5 text-center shadow-sm dark:border-amber-900/50 dark:bg-amber-950/40">
      <p class="text-sm font-semibold text-amber-950 dark:text-amber-100">{{ error_heading }}</p>
      <p class="mt-3 text-sm leading-relaxed text-amber-900/90 dark:text-amber-200/95">{{ error_detail }}</p>
      <p class="mt-5">
        <a
          class="text-sm font-medium text-amber-900 underline decoration-amber-700/40 underline-offset-2 hover:decoration-amber-900 dark:text-amber-200 dark:decoration-amber-500/50 dark:hover:decoration-amber-200"
          href="/"
        >
          Back to Import
        </a>
      </p>
    </div>
  </div>
{% endblock %}
