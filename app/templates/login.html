{% extends "base.html" %}
{% block content %}
  <div class="mx-auto max-w-md">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-900">
      <div class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Secure access</div>
      <h1 class="mt-2 text-2xl font-semibold text-slate-900 dark:text-slate-100">Sign in</h1>
      <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">
        Use your admin login to access Project: ATS.
      </p>

      <form method="post" action="/login" class="mt-6 space-y-4">
        <input type="hidden" name="next" value="{{ next_path or '/' }}" />
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-400" for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            value="{{ submitted_username or '' }}"
            required
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100"
          />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-400" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100"
          />
        </div>
        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white"
        >
          Sign in
        </button>
        {% if reset_admin_available %}
          <a href="/reset-admin-password" class="block text-center text-sm font-medium text-slate-600 hover:underline dark:text-slate-300">
            Reset admin password
          </a>
        {% endif %}
      </form>
    </div>
  </div>
{% endblock %}
